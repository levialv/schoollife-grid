<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#FB7299" />
  <meta name="description" content="毕业季数字成长档案：用学籍阶段记录陪你长大的动画、电影、游戏、UP主" />
  <title>数字成长档案 · 我的学籍×精神食粮</title>
  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/theme.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/components.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">📚</span>
        <span class="brand-text">数字成长档案</span>
      </div>
      <ol class="step-indicator" aria-label="步骤进度">
        <li data-step="1"><span>1</span><em>阶段</em></li>
        <li data-step="2"><span>2</span><em>题材</em></li>
        <li data-step="3"><span>3</span><em>填表</em></li>
        <li data-step="4"><span>4</span><em>分享</em></li>
      </ol>
    </header>

    <main class="app-main" id="appMain">

      <!-- Stage 1: choose current life stage -->
      <section class="stage" data-stage="1" aria-labelledby="stage1Title">
        <div class="stage-intro">
          <h1 id="stage1Title" class="stage-title">现在的你，正站在哪个路口？</h1>
          <p class="stage-sub">挑一个最贴近你当下学籍阶段的身份，下一步开始回顾。</p>
        </div>
        <div class="lifestage-grid" id="lifestageGrid" role="radiogroup" aria-label="当前生命阶段"></div>
      </section>

      <!-- Stage 2: pick categories -->
      <section class="stage" data-stage="2" aria-labelledby="stage2Title" hidden>
        <div class="stage-intro">
          <h1 id="stage2Title" class="stage-title">构成你人生的内容题材是？</h1>
          <p class="stage-sub">至少选一个题材。选中的题材会在下一步逐阶段填写。</p>
        </div>
        <div class="category-chips" id="categoryChips" role="group" aria-label="题材选择"></div>
      </section>

      <!-- Stage 3: grid editor -->
      <section class="stage" data-stage="3" aria-labelledby="stage3Title" hidden>
        <div class="stage-intro compact">
          <h1 id="stage3Title" class="stage-title">把陪你走过每段路的作品填上</h1>
          <p class="stage-sub">点击格子选作品；可在每个阶段下方填一个一起追的朋友（可跳过）。</p>
        </div>
        <div class="grid-scroll">
          <table class="grid-table" id="gridTable">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="grid-tip">长按已填的格子可清空</div>
      </section>

      <!-- Stage 4: share card -->
      <section class="stage" data-stage="4" aria-labelledby="stage4Title" hidden>
        <div class="stage-intro compact">
          <h1 id="stage4Title" class="stage-title">这就是你的数字成长档案</h1>
          <p class="stage-sub" id="stage4Sub">长按图片保存，发给一起追过的朋友。</p>
        </div>
        <div class="share-canvas-wrap">
          <canvas id="shareCanvas" aria-label="数字成长档案分享图"></canvas>
        </div>
        <div class="share-actions">
          <button class="btn btn-primary" id="downloadBtn" type="button">⬇️ 保存图片</button>
          <button class="btn btn-secondary" id="copyTextBtn" type="button">📋 复制分享文案</button>
          <button class="btn btn-link" id="restartBtn" type="button">再来一份</button>
        </div>
        <div class="share-text" id="shareText" aria-live="polite"></div>
      </section>

    </main>

    <footer class="app-footer" id="appFooter">
      <button class="btn btn-ghost" id="prevBtn" type="button" hidden>上一步</button>
      <button class="btn btn-primary" id="nextBtn" type="button" disabled>下一步</button>
    </footer>
  </div>

  <!-- bottom-sheet picker root -->
  <div class="picker-root" id="pickerRoot" hidden>
    <div class="picker-mask" data-action="close-picker"></div>
    <div class="picker-sheet" role="dialog" aria-modal="true" aria-labelledby="pickerTitle">
      <div class="picker-handle" aria-hidden="true"></div>
      <header class="picker-header">
        <h2 id="pickerTitle" class="picker-title">选作品</h2>
        <button class="picker-close" type="button" data-action="close-picker" aria-label="关闭">✕</button>
      </header>
      <div class="picker-search">
        <input id="pickerSearch" type="search" placeholder="输入名字搜索更多…" autocomplete="off" />
      </div>
      <div class="picker-status" id="pickerStatus" hidden></div>
      <ul class="picker-list" id="pickerList" role="listbox"></ul>
    </div>
  </div>

  <!-- toast -->
  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
